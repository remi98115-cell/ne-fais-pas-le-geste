const SX_OFF=136,SY_OFF=125;
const SX=CX+SX_OFF, SY=CY+SY_OFF;
const ARM_PIVOT_X=2, ARM_PIVOT_Y=9;

let angle=0,speed=0.12,score=0,rnd=1,running=true,waiting=false;
const DC=0,DR=0.35;

function na(a){while(a>Math.PI)a-=2*Math.PI;while(a<-Math.PI)a+=2*Math.PI;return a}
function danger(a){return Math.abs(na(a-DC))<DR}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  // Draw body (no arm)
  ctx.drawImage(bodyImg,CX,CY,CW,CH);
  // Draw arm sprite rotated
  ctx.save();
  ctx.translate(SX,SY);
  ctx.rotate(angle);
  ctx.drawImage(armImg,-ARM_PIVOT_X,-ARM_PIVOT_Y);
  ctx.restore();
}

function loop(){if(running){angle+=speed;draw();requestAnimationFrame(loop)}}

function stopArm(){
  if(!running&&!waiting)return;
  if(waiting){
    waiting=false;running=true;
    document.getElementById('btn').textContent='STOP';
    document.getElementById('msg').textContent='Appuie sur STOP ou ESPACE !';
    document.getElementById('msg').style.color='#fff';
    loop();return;
  }
  running=false;draw();
  if(danger(angle)){
    document.getElementById('msg').innerHTML='\u274C PERDU ! Tu as fait le geste !';
    document.getElementById('msg').style.color='#e94560';
    document.getElementById('btn').textContent='REJOUER';
    score=0;rnd++;speed+=0.02;
  }else{
    let p=10*rnd;score+=p;rnd++;speed+=0.02;
    document.getElementById('msg').innerHTML='\u2705 BRAVO ! +'+p+' points !';
    document.getElementById('msg').style.color='#00ff00';
    document.getElementById('btn').textContent='TOUR SUIVANT';
  }
  document.getElementById('score').textContent='Score: '+score;
  document.getElementById('spd').textContent='Vitesse: '+speed.toFixed(3)+' | Tour: '+rnd;
  waiting=true;
}

document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();stopArm()}});

let loaded=0;
function onReady(){loaded++;if(loaded>=2){draw();loop()}}
bodyImg.onload=onReady;
armImg.onload=onReady;
</script>
</body>
</html>
